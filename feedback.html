<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f9f9f9; }
        .feedback-box { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px #ccc; width: 300px; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="feedback-box">
        <h1>Feedback Form</h1>
        <form>
            <input type="text" placeholder="आपका नाम" required><br>
            <textarea placeholder="आपका सुझाव" rows="4" required></textarea><br>
            <button type="submit" class="btn">भेजें</button>
        </form>
        <br>
        <a href="index.html">होम पेज पर वापस जाएं</a>
    </div>
</body>
</html>
